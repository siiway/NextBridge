[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.11.0"

[[repos.hooks]]
id = "ruff"
args = ["--fix"]

[[repos.hooks]]
id = "ruff-format"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ty"
name = "ty check"
entry = "uv"
args = ["run", "ty", "check"]
language = "system"
pass_filenames = false
